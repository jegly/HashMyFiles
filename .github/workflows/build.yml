  release:
    name: GitHub Release
    needs: [deb, rpm]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          name: "HashMyFiles ${{ github.ref_name }}"
          body: |
            ## HashMyFiles ${{ github.ref_name }}
            | Package | Platform |
            |---------|----------|
            | `.deb`  | Ubuntu 23.04+, Debian 12+ |
            | `.rpm`  | Fedora 38+, RHEL 9+ |
            ```bash
            sudo dpkg -i hashmyfiles_*_amd64.deb
            sudo rpm -i hashmyfiles-*.rpm
             draft: false
             prerelease: false
             files: |
             dist//*.deb
             dist//*.rpm
