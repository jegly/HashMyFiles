name: Build & Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: hashmyfiles

jobs:
  test:
    name: Cargo test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo test --all

  deb:
    name: Build .deb
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev pkg-config \
            debhelper devscripts dpkg-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: deb-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Assemble .deb
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          PKG=hashmyfiles_${VERSION}_amd64
          mkdir -p dist/${PKG}/DEBIAN dist/${PKG}/usr/bin \
            dist/${PKG}/usr/share/applications \
            dist/${PKG}/usr/share/icons/hicolor/scalable/apps
          cp target/release/hashmyfiles dist/${PKG}/usr/bin/
          cp resources/hashmyfiles.desktop dist/${PKG}/usr/share/applications/
          cp resources/icon.svg dist/${PKG}/usr/share/icons/hicolor/scalable/apps/hashmyfiles.svg
          sed "s/VERSION_PLACEHOLDER/${VERSION}/" debian/templates/control.template > dist/${PKG}/DEBIAN/control
          dpkg-deb --build --root-owner-group dist/${PKG} dist/${PKG}.deb
          echo "DEB_PATH=dist/${PKG}.deb" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: hashmyfiles-deb
          path: ${{ env.DEB_PATH }}

  rpm:
    name: Build .rpm
    needs: test
    runs-on: ubuntu-24.04
    container:
      image: fedora:40
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          dnf install -y \
            gtk4-devel libadwaita-devel glib2-devel pkgconf \
            cargo rust rpm-build rpmdevtools python3

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rpm-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Assemble .rpm
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          rpmdev-setuptree
          cp target/release/hashmyfiles ~/rpmbuild/SOURCES/
          cp resources/hashmyfiles.desktop ~/rpmbuild/SOURCES/
          cp resources/icon.svg ~/rpmbuild/SOURCES/
          sed "s/VERSION_PLACEHOLDER/${VERSION}/" debian/templates/hashmyfiles.spec.template > ~/rpmbuild/SPECS/hashmyfiles.spec
          mkdir -p dist
          rpmbuild -bb ~/rpmbuild/SPECS/hashmyfiles.spec
          cp ~/rpmbuild/RPMS/x86_64/hashmyfiles-*.rpm dist/

      - uses: actions/upload-artifact@v4
        with:
          name: hashmyfiles-rpm
          path: dist/*.rpm

  appimage:
    name: Build AppImage
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev pkg-config \
            wget fuse libfuse2 file

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: appimage-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk-x86_64.AppImage

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
            AppDir/usr/share/icons/hicolor/scalable/apps
          cp target/release/hashmyfiles AppDir/usr/bin/
          cp resources/hashmyfiles.desktop AppDir/usr/share/applications/
          cp resources/icon.svg AppDir/usr/share/icons/hicolor/scalable/apps/hashmyfiles.svg

      - name: Build AppImage
        env:
          DEPLOY_GTK_VERSION: 4
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir --plugin gtk --output appimage \
            --desktop-file resources/hashmyfiles.desktop \
            --icon-file resources/icon.svg
          mkdir -p dist
          mv *.AppImage dist/

      - uses: actions/upload-artifact@v4
        with:
          name: hashmyfiles-appimage
          path: dist/*.AppImage

  release:
    name: GitHub Release
    needs: [deb, rpm, appimage]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          name: "HashMyFiles ${{ github.ref_name }}"
          body: |
            ## HashMyFiles ${{ github.ref_name }}

            | Package | Platform |
            |---------|----------|
            | `.deb`  | Ubuntu 23.04+, Debian 12+ |
            | `.rpm`  | Fedora 38+, RHEL 9+ |
            | `.AppImage` | Any Linux (portable) |

            ```bash
            sudo dpkg -i hashmyfiles_*_amd64.deb
            sudo rpm -i hashmyfiles-*.rpm
            chmod +x hashmyfiles-*.AppImage && ./hashmyfiles-*.AppImage
            ```
          draft: false
          prerelease: false
          files: |
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.AppImage
